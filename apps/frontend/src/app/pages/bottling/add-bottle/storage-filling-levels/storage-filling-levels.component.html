<div class="flex flex-col gap-2 rounded-lg bg-white p-4">
  <h3 class="text-neutral-500">Filling Levels</h3>
  @if (chartData()?.length === 0) {
    <div class="flex flex-col items-center gap-2">
      <span class="material-symbols-outlined text-neutral-300">bar_chart</span>
      <p class="text-sm text-neutral-500">No data available.</p>
    </div>
  } @else if (chartData()) {
    <div class="max-h-[30vh] overflow-y-auto">
      <div
        echarts
        [options]="chartOption$()"
        class="echart"
        [style]="{ height: (chartData()?.length ?? 1) * 10 + 'rem' }"
      ></div>
    </div>
  } @else {
    <div><span class="material-symbols-outlined animate-spin">progress_activity</span></div>
  }
</div>
