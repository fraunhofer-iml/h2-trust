@if (productionQuery.data(); as data) {
  <div class="grid w-full grid-cols-7 gap-2">
    <div class="col-span-7 flex w-full flex-row items-center gap-2 rounded-md bg-white p-2 2xl:col-span-4">
      <app-statistics-card
        class="h-full grow"
        [config]="{
          icon: ICONS.POWER.BASE,
          value: data.power.total,
          percentage: null,
          unit: MeasurementUnit.KWH,
          label: 'Total power used',
          theme: 'power-total',
        }"
      ></app-statistics-card>
      <app-statistics-card
        class="h-full grow"
        [config]="{
          icon: ICONS.POWER.RENEWABLE,
          value: data.power.renewable,
          percentage: data.power.renewable / data.power.total,
          unit: MeasurementUnit.KWH,
          label: 'Renewable power',
          theme: 'power-fraction',
        }"
      ></app-statistics-card>
      <div class="h-[80%] w-[1px] bg-neutral-200"></div>
      <app-statistics-card
        class="h-full grow"
        [config]="{
          icon: ICONS.POWER.PARTLY_RENEWABLE,
          value: data.power.partlyRenewable,
          percentage: data.power.partlyRenewable / data.power.total,
          unit: MeasurementUnit.KWH,
          label: 'Partly-renewable power',
          theme: 'power-fraction',
        }"
      ></app-statistics-card>
      <div class="h-[80%] w-[1px] bg-neutral-200"></div>
      <app-statistics-card
        class="h-full grow"
        [config]="{
          icon: ICONS.POWER.NON_RENEWABLE,
          value: data.power.nonRenewable,
          percentage: data.power.nonRenewable / data.power.total,
          unit: MeasurementUnit.KWH,
          label: 'Non-renewable power',
          theme: 'power-fraction',
        }"
      ></app-statistics-card>
    </div>

    <div class="col-span-7 flex w-full flex-row items-center gap-2 rounded-md bg-white p-2 2xl:col-span-3">
      <app-statistics-card
        class="h-full grow"
        [config]="{
          icon: ICONS.HYDROGEN.BASE,
          value: data.hydrogen.total,
          percentage: null,
          unit: MeasurementUnit.KG_H2,
          label: 'Total hydrogen produced',
          theme: 'hydrogen-total',
        }"
      ></app-statistics-card>
      <app-statistics-card
        class="h-full grow"
        [config]="{
          icon: ICONS.HYDROGEN.RFNBO_READY,
          value: data.hydrogen.rfnboReady,
          percentage: data.hydrogen.rfnboReady / data.hydrogen.total,
          unit: MeasurementUnit.KG_H2,
          label: 'Hydrogen RFNBO-ready',
          theme: 'hydrogen-fraction',
        }"
      ></app-statistics-card>
      <div class="h-[80%] w-[1px] bg-neutral-200"></div>
      <app-statistics-card
        class="h-full grow"
        [config]="{
          icon: ICONS.HYDROGEN.NON_CERTIFIABLE,
          value: data.hydrogen.nonCertifiable,
          percentage: data.hydrogen.nonCertifiable / data.hydrogen.total,
          unit: MeasurementUnit.KG_H2,
          label: 'Non-certifiable hydrogen',
          theme: 'hydrogen-fraction',
        }"
      ></app-statistics-card>
    </div>
  </div>
}
