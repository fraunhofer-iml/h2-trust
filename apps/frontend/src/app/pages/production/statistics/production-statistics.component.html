<div class="flex w-full flex-row gap-2">
  @for (item of data(); track $index) {
    <div class="flex w-full grow flex-col rounded-lg p-4" [ngClass]="themes[item.theme].bg">
      <span class="material-symbols-outlined mb-4 w-fit rounded-full border p-2" [ngClass]="themes[item.theme].icon">
        {{ item.icon }}
      </span>
      <span class="text-base">{{ item.value | unit: item.unit }}</span>
      <span class="text-xs text-neutral-600">{{ item.label }}</span>
    </div>
  }
</div>
