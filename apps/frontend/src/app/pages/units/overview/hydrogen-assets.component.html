<div class="flex flex-col gap-4 p-8">
  <h2 class="text-lg text-neutral-800">Units</h2>

  <div class="flex w-full items-center justify-between">
    <div class="flex flex-row gap-4">
      <div>
        <p class="text-sm text-neutral-500">Filter by type</p>
        <mat-chip-set aria-label="List filter">
          @for (unitType of unitTypes; track unitType) {
            <mat-chip-option selectable [selected]="typeToShow() === unitType" (click)="selectType(unitType)">
              {{ unitType | enum: 'unitType' }}
            </mat-chip-option>
          }
          <mat-chip-option selectable [selected]="!typeToShow()" (click)="showAll()"> All </mat-chip-option>
        </mat-chip-set>
      </div>
    </div>
    <button [routerLink]="['create']" mat-flat-button>Add Unit</button>
  </div>
  <mat-divider></mat-divider>

  <div class="3xl:grid-cols-4 grid grid-cols-3 gap-4">
    @for (item of unitsQuery.data() ?? []; track item.id) {
      <div class="rounded-lg border border-neutral-200 bg-white p-4">
        <app-unit-card [unit]="item"> </app-unit-card>
      </div>
    }
  </div>
</div>
