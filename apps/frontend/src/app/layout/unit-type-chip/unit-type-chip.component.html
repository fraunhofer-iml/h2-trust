<div
  class="flex w-fit min-w-40 flex-row items-center gap-2 rounded-lg border px-2 text-sm"
  [ngClass]="{
    'text-primary-500': unitType() === UnitType.POWER_PRODUCTION,
    'text-secondary-500': unitType() === UnitType.HYDROGEN_PRODUCTION,
    'text-neutral-500': unitType() === UnitType.HYDROGEN_STORAGE,
  }"
>
  <span
    class="material-symbols-outlined text-lg"
    [ngClass]="{
      'text-primary-400': unitType() === UnitType.POWER_PRODUCTION,
      'text-secondary-400': unitType() === UnitType.HYDROGEN_PRODUCTION,
      'text-neutral-400': unitType() === UnitType.HYDROGEN_STORAGE,
    }"
  >
    {{ getIcon() }}
  </span>
  {{ unitType() | prettyEnum | titlecase }}
</div>
