services:
  ############
  # DATABASE #
  ############

  postgres:
    image: postgres:17.7-alpine3.23
    restart: unless-stopped
    environment:
      - POSTGRES_USER=admin
      - POSTGRES_PASSWORD=admin12345
      - POSTGRES_DB=h2_trust
    logging:
      options:
        max-size: 10m
        max-file: '3'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U admin -d h2_trust']
      interval: 5s
      timeout: 5s
      retries: 10
    ports:
      - '5432:5432'
    volumes:
      - './docker/postgres/init:/docker-entrypoint-initdb.d'

  ###########
  # STORAGE #
  ###########

  minio:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z
    restart: unless-stopped
    environment:
      - MINIO_ROOT_USER=admin
      - MINIO_ROOT_PASSWORD=admin12345
    ports:
      - '9000:9000'
      - '9090:9090'
    healthcheck:
      test: ['CMD', 'mc', 'ready', 'local']
      interval: 5s
      timeout: 5s
      retries: 5
    command:
      - server
      - /data
      - --address=:9000
      - --console-address=:9090

  minio-setup:
    image: minio/mc:RELEASE.2025-08-13T08-35-41Z
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: ['/bin/sh', '-c']
    command:
      - |
        mc alias set local http://minio:9000 admin admin12345
        mc mb --ignore-existing local/h2-trust
        mc anonymous set download local/h2-trust

  ##############
  # BLOCKCHAIN #
  ##############

  blockchain:
    build:
      context: ./docker/blockchain
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - '8545:8545'
    healthcheck:
      test: ['CMD', 'curl', '-sf', 'http://localhost:8545/liveness']
      interval: 5s
      timeout: 5s
      retries: 5

  blockchain-setup:
    build:
      context: .
      dockerfile: docker/blockchain-setup/Dockerfile
    depends_on:
      blockchain:
        condition: service_healthy

  #########
  # UTILS #
  #########

  keycloak:
    image: quay.io/keycloak/keycloak:26.5
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - '8080:8080'
    command:
      - start-dev
      - --import-realm
    environment:
      KC_DB: postgres
      KC_DB_URL_HOST: postgres
      KC_DB_URL_PORT: 5432
      KC_DB_URL_DATABASE: keycloak
      KC_DB_SCHEMA: public
      KC_DB_USERNAME: admin
      KC_DB_PASSWORD: admin12345
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin12345
      KC_HTTP_ENABLED: 'true'
      KC_HTTP_PORT: 8080
      KC_HOSTNAME: localhost
      KC_HOSTNAME_STRICT: 'false'
      KC_HOSTNAME_BACKCHANNEL_DYNAMIC: 'false'
      KC_PROXY_HEADERS: xforwarded
      KC_HEALTH_ENABLED: 'true'
      KC_METRICS_ENABLED: 'true'
      KC_LOG_LEVEL: WARN
    volumes:
      - './libs/configuration/src/keycloak/realm.json:/opt/keycloak/data/import/realm.json'
    healthcheck:
      test:
        - CMD-SHELL
        - >
          bash -c '
            exec 3<>/dev/tcp/localhost/8080;
            printf "GET /realms/master/.well-known/openid-configuration HTTP/1.0\r\nHost: localhost\r\n\r\n" >&3;
            grep -q "HTTP/1\.[01] 200" <&3
          '
      start_period: 10s
      interval: 5s
      timeout: 5s
      retries: 10

  rabbitmq:
    image: rabbitmq:4.2.3-management-alpine
    ports:
      - '5672:5672'
      - '15672:15672'
    environment:
      RABBITMQ_LOGS: '-warn'

networks:
  default:
    name: h2-trust
    driver: bridge
