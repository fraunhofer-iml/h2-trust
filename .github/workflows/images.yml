name: Images

on:
  push:
    branches:
      - main
    tags:
      - 'v*.*.*'

jobs:
  build-and-push-images:
    runs-on: ubuntu-latest
    if: >
      startsWith(github.ref, 'refs/tags/') || (github.ref == 'refs/heads/main' &&
      !startsWith(github.event.head_commit.message, 'chore'))

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Common Setup
        uses: ./.github/actions/common-setup

      - name: Determine Version Tag
        id: vars
        run: |
          if [[ "$GITHUB_REF" == refs/tags/* ]]; then
            echo "version=$GITHUB_REF_NAME" >> "$GITHUB_OUTPUT"
          else
            echo "version=" >> "$GITHUB_OUTPUT"
          fi

      - name: Build Artifacts
        run: npx nx run-many --all -t build --parallel

      - name: Setup Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & Push bff
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/nest.dockerfile
          build-args: APP=bff
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/bff:latest
            ${{ steps.vars.outputs.version && format('ghcr.io/{0}/bff:{1}', github.repository, steps.vars.outputs.version) || '' }}

      - name: Build & Push frontend
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/angular.dockerfile
          build-args: APP=frontend
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/frontend:latest
            ${{ steps.vars.outputs.version && format('ghcr.io/{0}/frontend:{1}', github.repository, steps.vars.outputs.version) || '' }}

      - name: Build & Push general-svc
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/nest.dockerfile
          build-args: APP=general-svc
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/general-svc:latest
            ${{ steps.vars.outputs.version && format('ghcr.io/{0}/general-svc:{1}', github.repository, steps.vars.outputs.version) || '' }}

      - name: Build & Push process-svc
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/nest.dockerfile
          build-args: APP=process-svc
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/process-svc:latest
            ${{ steps.vars.outputs.version && format('ghcr.io/{0}/process-svc:{1}', github.repository, steps.vars.outputs.version) || '' }}
