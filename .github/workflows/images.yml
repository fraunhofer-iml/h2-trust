name: Images

on:
  push:
    branches: ['main']
    tags:
      - 'v*.*.*'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-and-push-images:
    if: ${{ github.ref_type == 'tag' || !startsWith(github.event.head_commit.message, 'chore') }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Common Setup
        uses: ./.github/actions/common-setup

      - name: Determine Release Variables
        id: release
        run: |
          if [[ "$GITHUB_REF_NAME" == 'main' ]]; then
            echo "version=$GITHUB_SHA" >> "$GITHUB_OUTPUT"
            echo "frontend_config=dev" >> "$GITHUB_OUTPUT"
            echo "push_latest=true" >> "$GITHUB_OUTPUT"
          elif [[ "$GITHUB_REF_NAME" =~ -rc\. ]]; then
            echo "version=$GITHUB_REF_NAME" >> "$GITHUB_OUTPUT"
            echo "frontend_config=staging" >> "$GITHUB_OUTPUT"
            echo "push_latest=false" >> "$GITHUB_OUTPUT"
          else
            echo "version=$GITHUB_REF_NAME" >> "$GITHUB_OUTPUT"
            echo "frontend_config=production" >> "$GITHUB_OUTPUT"
            echo "push_latest=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Build Backend Artifacts
        run: npx nx run-many -t build --projects=bff,general-svc,process-svc --parallel

      - name: Build Frontend Artifacts
        run: npx nx run frontend:build --configuration=${{ steps.release.outputs.frontend_config }} --verbose

      - name: Setup Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & Push bff
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/nest.dockerfile
          build-args: APP=bff
          push: true
          tags: |
            ${{ steps.release.outputs.push_latest == 'true' && format('ghcr.io/{0}/bff:latest', github.repository) || '' }}
            ghcr.io/${{ github.repository }}/bff:${{ steps.release.outputs.version }}

      - name: Build & Push frontend
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/angular.dockerfile
          build-args: APP=frontend
          push: true
          tags: |
            ${{ steps.release.outputs.push_latest == 'true' && format('ghcr.io/{0}/frontend:latest', github.repository) || '' }}
            ghcr.io/${{ github.repository }}/frontend:${{ steps.release.outputs.version }}

      - name: Build & Push general-svc
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/nest.dockerfile
          build-args: APP=general-svc
          push: true
          tags: |
            ${{ steps.release.outputs.push_latest == 'true' && format('ghcr.io/{0}/general-svc:latest', github.repository) || '' }}
            ghcr.io/${{ github.repository }}/general-svc:${{ steps.release.outputs.version }}

      - name: Build & Push process-svc
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/nest.dockerfile
          build-args: APP=process-svc
          push: true
          tags: |
            ${{ steps.release.outputs.push_latest == 'true' && format('ghcr.io/{0}/process-svc:latest', github.repository) || '' }}
            ghcr.io/${{ github.repository }}/process-svc:${{ steps.release.outputs.version }}
