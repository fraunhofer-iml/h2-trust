name: Images

on:
  push:
    tags:
      - 'v*.*.*'

concurrency:
  group: images-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-push-images:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Common Setup
        uses: ./.github/actions/common-setup

      - name: Determine Version Tag
        id: vars
        run: |
          echo "version=$GITHUB_REF_NAME" >> "$GITHUB_OUTPUT"
          if [[ "$GITHUB_REF_NAME" =~ -rc\. ]]; then
            echo "frontend_config=staging" >> "$GITHUB_OUTPUT"
          else
            echo "frontend_config=production" >> "$GITHUB_OUTPUT"
          fi

      - name: Build Artifacts
        run: npx nx run-many -t build --projects=bff,general-svc,process-svc --parallel

      - name: Build Frontend
        run: npx nx run frontend:build --configuration=${{ steps.vars.outputs.frontend_config }} --verbose

      - name: Setup Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & Push bff
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/nest.dockerfile
          build-args: APP=bff
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/bff:latest
            ghcr.io/${{ github.repository }}/bff:${{ steps.vars.outputs.version }}

      - name: Build & Push frontend
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/angular.dockerfile
          build-args: APP=frontend
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/frontend:latest
            ghcr.io/${{ github.repository }}/frontend:${{ steps.vars.outputs.version }}

      - name: Build & Push general-svc
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/nest.dockerfile
          build-args: APP=general-svc
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/general-svc:latest
            ghcr.io/${{ github.repository }}/general-svc:${{ steps.vars.outputs.version }}

      - name: Build & Push process-svc
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/nest.dockerfile
          build-args: APP=process-svc
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/process-svc:latest
            ghcr.io/${{ github.repository }}/process-svc:${{ steps.vars.outputs.version }}
