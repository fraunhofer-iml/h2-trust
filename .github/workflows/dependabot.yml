name: Dependabot
on:
  pull_request_target:
    types: [opened, synchronize, reopened, closed]

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-merge-and-approve:
    runs-on: ubuntu-latest
    if: >
      github.event.action != 'closed' && github.actor == 'dependabot[bot]' && github.event.pull_request.user.login ==
      'dependabot[bot]' && github.event.pull_request.head.repo.fork == false
    steps:
      - name: Fetch Dependabot metadata
        id: metadata
        uses: dependabot/fetch-metadata@v2
        with:
          github-token: '${{ secrets.GITHUB_TOKEN }}'

      - name: Approve PR
        if: >
          steps.metadata.outputs.update-type == 'version-update:semver-patch' || steps.metadata.outputs.update-type ==
          'version-update:semver-minor'
        run: gh pr review --approve "$PR_URL"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Auto-merge patch and minor updates
        if: >
          steps.metadata.outputs.update-type == 'version-update:semver-patch' || steps.metadata.outputs.update-type ==
          'version-update:semver-minor'
        run: gh pr merge --auto --squash "$PR_URL"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  rebase:
    runs-on: ubuntu-latest
    if: >
      github.event.action == 'closed' && github.event.pull_request.merged == true
    steps:
      - name: Rebase open Dependabot PRs
        run: |
          gh pr list --author 'dependabot[bot]' --limit 10 --json number --jq '.[].number' | \
            while read -r number; do
              gh pr comment "$number" --body '@dependabot rebase'
            done
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
