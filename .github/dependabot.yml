version: 2
# GitHub Dependabot does not support a true manual-only mode in dependabot.yml.
# Use the manual trigger in GitHub: Insights -> Dependency graph -> Dependabot -> Check for updates.
# The schedules below are therefore reduced to a minimal automatic cadence.
updates:
  - package-ecosystem: 'npm'
    directory: '/'
    schedule:
      interval: 'yearly'
      time: '07:00'
      timezone: 'Europe/Berlin'
    open-pull-requests-limit: 10
    labels:
      - 'dependencies'
      - 'npm'
    groups:
      angular:
        patterns:
          - '@angular/*'
          - '@angular-devkit/*'
          - '@schematics/angular'
          - 'angular-eslint'
          - 'zone.js'
      nestjs:
        patterns:
          - '@nestjs/*'
      nx:
        patterns:
          - '@nx/*'
          - '@swc/*'
          - '@swc-node/*'
          - 'nx'
      prisma:
        patterns:
          - '@prisma/*'
          - 'prisma'
      keycloak:
        patterns:
          - '*keycloak*'
      linting:
        patterns:
          - '@ianvs/prettier-plugin-sort-imports'
          - '@typescript-eslint/*'
          - '*eslint*'
          - 'prettier*'
      testing:
        patterns:
          - '@playwright/*'
          - '*jest*'
      babel:
        patterns:
          - '@babel/*'
      types:
        patterns:
          - '@types/*'
    ignore:
      - dependency-name: '@prisma/*'
        versions: ['>= 7.0.0']
      - dependency-name: 'prisma'
        versions: ['>= 7.0.0']

  - package-ecosystem: 'npm'
    directory: '/libs/blockchain/smart-contract'
    schedule:
      interval: 'yearly'
      time: '07:00'
      timezone: 'Europe/Berlin'
    open-pull-requests-limit: 10
    labels:
      - 'dependencies'
      - 'npm'
    groups:
      hardhat:
        patterns:
          - '@nomicfoundation/*'
          - 'ethers'
          - 'hardhat'
      testing:
        patterns:
          - '@types/chai'
          - '@types/chai-as-promised'
          - '@types/mocha'
          - 'chai'
          - 'mocha'
      typescript:
        patterns:
          - '@types/node'
          - 'typescript'

  - package-ecosystem: 'docker'
    directories:
      - '/'
      - '/docker'
      - '/docker/blockchain'
      - '/docker/blockchain-setup'
    schedule:
      interval: 'yearly'
      time: '07:00'
      timezone: 'Europe/Berlin'
    open-pull-requests-limit: 5
    labels:
      - 'dependencies'
      - 'docker'
    ignore:
      - dependency-name: 'node'
        versions: ['>= 25.0.0']

  - package-ecosystem: 'docker-compose'
    directory: '/'
    schedule:
      interval: 'yearly'
      time: '07:00'
      timezone: 'Europe/Berlin'
    open-pull-requests-limit: 5
    labels:
      - 'dependencies'
      - 'docker'
    ignore:
      - dependency-name: 'node'
        versions: ['>= 25.0.0']

  - package-ecosystem: 'github-actions'
    directory: '/'
    schedule:
      interval: 'yearly'
      time: '07:00'
      timezone: 'Europe/Berlin'
    open-pull-requests-limit: 0
    labels:
      - 'dependencies'
      - 'github-actions'
